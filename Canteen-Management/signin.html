<html></html>
<head>
    <title>signin</title>
    <style>
        body {
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.2)), url("b3.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            font-family: "Segoe UI", sans-serif;
            color: #222;
        }
        h1 {
            text-align: center;
            color: white;
            text-shadow: 1px 1px 5px black;
        }
        div{
            border: 2px outset;
            padding: 20px;
            margin-left: 20px;
            margin-right: 20px;
        }
        #su,#re{
            margin-left: 25px;
            background-color: rgb(220, 237, 253);
            height: 30px;
            width: 80px;
            border: 2px;
            border-radius: 10px;
            box-shadow: 0px 3px 5px 0px;
        }
        form {
            margin: 100px auto; 
            font-family: sans-serif;
            border: 2px solid black; 
            border-radius: 15px;
            padding: 20px;
            box-shadow: 1px 2px 10px 0px rgb(255,255,255);
            width: 30%; 
            min-width: 300px; 
            max-width: 600px; 
            background-color: white;
        }
        #su:hover, #re:hover {
            background-color: #cce5ff;
            color: #0077ff;
        }
        a {
            text-decoration: none;
            color: #0077cc;
        }

            a:hover {
                text-decoration: underline;
            }
    </style>
    <script>
        function submitfun()
        {
            return true;
        }
        function resetfun()
        {
            var a=confirm("Do you really want to reset all the entered data ?");
            if(a){return true;}
            else{return false;}   
        }
    </script>
</head>
<body>
<form onsubmit="return submitfun()" onreset="return resetfun()" action="signin.php" method="POST">
    <h1><img src="a1.jpg" height="18px" width="20px" style="padding: 0px 15px 0px 15px;">User Signin</h1>
    <div>
        <label>Enter your registered Email</label>
        <input type="text" id="em" name="em" placeholder="xxxxxx@aitdgoa.edu.in">
    </div>
    <div>
        <label>Enter your password</label>
        <input type="password" id="ps" name="ps" placeholder="password">
    </div>
    <br>
    <input type="submit" id="su" name="su">
    <input type="reset" id="re" name="re">
    <br><br><div><a href="signup.html">if don't have an account click here</a></div>
</form>
</body>
</html>
